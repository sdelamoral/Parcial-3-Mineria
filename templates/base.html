<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sentiment Analysis — Kindle Reviews</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f5f8fc; color: #0a2342; font-family: sans-serif; }

    /* Sidebar */
    #sidebar {
      width: 220px; min-height: 100vh; background: #0a2342;
      position: fixed; top: 0; left: 0; padding: 24px 12px;
      display: flex; flex-direction: column;
    }
    #sidebar .brand { color: #c8dff0; font-weight: 600; font-size: 1rem; margin-bottom: 4px; }
    #sidebar .sub   { color: #7aaed4; font-size: 0.75rem; margin-bottom: 24px; }
    #sidebar a {
      display: flex; align-items: center; gap: 8px;
      color: #c8dff0; text-decoration: none;
      padding: 9px 12px; border-radius: 6px;
      border: 1px solid transparent;
      margin-bottom: 4px; font-size: 0.9rem; transition: all 0.15s;
    }
    #sidebar a:hover    { background: #1e3a5f; border-color: #4a9fd4; }
    #sidebar a.active   { background: #2e6da4; border-color: #4a9fd4; color: #fff; }

    /* Main */
    #main { margin-left: 220px; padding: 40px 48px; min-height: 100vh; }

    h1 { color: #0a2342; font-weight: 700; margin-bottom: 20px; }
    h4, h5 { color: #1e3a5f; }

    /* Buttons */
    .btn-navy {
      background: #2e6da4; color: #fff; border: none;
      border-radius: 6px; padding: 8px 20px;
    }
    .btn-navy:hover { background: #1e3a5f; color: #fff; }

    /* Cards */
    .card { border: none; border-radius: 10px; box-shadow: 0 1px 6px rgba(10,35,66,.08); }
    .card-header { background: #ddeaf7; color: #0a2342; font-weight: 600; border-radius: 10px 10px 0 0 !important; }

    /* Code blocks */
    pre, code { background: #ddeaf7; color: #0a2342; border-radius: 6px; padding: 2px 6px; font-size: 0.85rem; }
    pre { padding: 12px; }

    /* Next button */
    .next-btn { margin-top: 40px; }

    /* Result boxes */
    .result-pos { background: #ddeaf7; border-left: 4px solid #2e6da4; padding: 16px; border-radius: 6px; }
    .result-neg { background: #f0e8f0; border-left: 4px solid #0a2342; padding: 16px; border-radius: 6px; }

    /* Table */
    .table thead th { background: #0a2342; color: #c8dff0; }

    /* Nav icons */
    .nav-icon { font-size: 1rem; }
  </style>
</head>
<body>

<div id="sidebar">
  <div class="brand">Sentiment Analysis</div>
  <div class="sub">Kindle Reviews · NLP Pipeline</div>
  <a href="{{ url_for('inicio') }}"           class="{{ 'active' if request.endpoint=='inicio' }}">Inicio</a>
  <a href="{{ url_for('dataset') }}"          class="{{ 'active' if request.endpoint=='dataset' }}">Dataset</a>
  <a href="{{ url_for('preprocesamiento') }}" class="{{ 'active' if request.endpoint=='preprocesamiento' }}">Preprocesamiento</a>
  <a href="{{ url_for('resultados') }}"       class="{{ 'active' if request.endpoint=='resultados' }}">Resultados</a>
  <a href="{{ url_for('analisis') }}"         class="{{ 'active' if request.endpoint=='analisis' }}">Analisis Comparativo</a>
  <a href="{{ url_for('demo') }}"             class="{{ 'active' if request.endpoint=='demo' }}">Demo</a>
</div>

<div id="main">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
